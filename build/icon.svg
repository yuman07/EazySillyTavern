<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241B5C"/>
      <stop offset="1" stop-color="#3D1640"/>
    </linearGradient>

    <radialGradient id="ambientGlow" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0" stop-color="#7B4DD8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7B4DD8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B27845"/>
      <stop offset="0.45" stop-color="#8E5A2A"/>
      <stop offset="1" stop-color="#5A3618"/>
    </linearGradient>

    <linearGradient id="iron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5C5650"/>
      <stop offset="0.3" stop-color="#2A2520"/>
      <stop offset="0.7" stop-color="#231E1A"/>
      <stop offset="1" stop-color="#161210"/>
    </linearGradient>

    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C871"/>
      <stop offset="1" stop-color="#C58F2E"/>
    </linearGradient>

    <radialGradient id="foam" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#FFFEF5"/>
      <stop offset="1" stop-color="#EBD3A8"/>
    </radialGradient>

    <radialGradient id="sparkleGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#C77DFF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#C77DFF" stop-opacity="0"/>
    </radialGradient>

    <symbol id="sparkle" viewBox="-50 -50 100 100" overflow="visible">
      <path d="M 0 -50 Q 5 -8 50 0 Q 5 8 0 50 Q -5 8 -50 0 Q -5 -8 0 -50 Z"/>
    </symbol>

    <clipPath id="panel">
      <rect x="72" y="72" width="880" height="880" rx="200" ry="200"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="#0D1226"/>

  <g clip-path="url(#panel)">
    <rect x="72" y="72" width="880" height="880" fill="url(#panelBg)"/>

    <circle cx="512" cy="610" r="400" fill="url(#ambientGlow)"/>

    <g transform="translate(512 600)">
      <path d="M 195 -130 Q 325 -130 325 -10 Q 325 115 195 115 L 195 65 Q 273 65 273 -10 Q 273 -85 195 -85 Z"
            fill="url(#wood)"/>
      <path d="M 215 -118 Q 308 -118 308 -10"
            fill="none" stroke="#E2A66B" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

      <path d="M -220 -200 L 200 -200 L 200 222 Q 200 244 178 244 L -198 244 Q -220 244 -220 222 Z"
            fill="url(#wood)"/>

      <g opacity="0.5" stroke="#5A3618" stroke-width="2.5" stroke-linecap="round">
        <line x1="-130" y1="-178" x2="-130" y2="238"/>
        <line x1="-50"  y1="-178" x2="-50"  y2="238"/>
        <line x1="40"   y1="-178" x2="40"   y2="238"/>
        <line x1="120"  y1="-178" x2="120"  y2="238"/>
      </g>

      <g opacity="0.22" stroke="#F4D29C" stroke-width="3" stroke-linecap="round">
        <line x1="-178" y1="-130" x2="-178" y2="200"/>
        <line x1="-90"  y1="-130" x2="-90"  y2="200"/>
        <line x1="0"    y1="-130" x2="0"    y2="200"/>
        <line x1="80"   y1="-130" x2="80"   y2="200"/>
      </g>

      <rect x="-220" y="-180" width="420" height="46" fill="url(#iron)"/>
      <rect x="-220" y="-178" width="420" height="3"  fill="#7A7570" opacity="0.7"/>
      <g fill="#8A8580">
        <circle cx="-180" cy="-157" r="4.5"/>
        <circle cx="-108" cy="-157" r="4.5"/>
        <circle cx="-36"  cy="-157" r="4.5"/>
        <circle cx="36"   cy="-157" r="4.5"/>
        <circle cx="108"  cy="-157" r="4.5"/>
        <circle cx="180"  cy="-157" r="4.5"/>
      </g>
      <g fill="#000" opacity="0.5">
        <circle cx="-180" cy="-156" r="1.5"/>
        <circle cx="-108" cy="-156" r="1.5"/>
        <circle cx="-36"  cy="-156" r="1.5"/>
        <circle cx="36"   cy="-156" r="1.5"/>
        <circle cx="108"  cy="-156" r="1.5"/>
        <circle cx="180"  cy="-156" r="1.5"/>
      </g>

      <path d="M -220 178 L 200 178 L 200 222 Q 200 244 178 244 L -198 244 Q -220 244 -220 222 Z"
            fill="url(#iron)"/>
      <rect x="-220" y="180" width="420" height="3" fill="#7A7570" opacity="0.7"/>
      <g fill="#8A8580">
        <circle cx="-180" cy="208" r="4.5"/>
        <circle cx="-108" cy="208" r="4.5"/>
        <circle cx="-36"  cy="208" r="4.5"/>
        <circle cx="36"   cy="208" r="4.5"/>
        <circle cx="108"  cy="208" r="4.5"/>
        <circle cx="180"  cy="208" r="4.5"/>
      </g>
      <g fill="#000" opacity="0.5">
        <circle cx="-180" cy="209" r="1.5"/>
        <circle cx="-108" cy="209" r="1.5"/>
        <circle cx="-36"  cy="209" r="1.5"/>
        <circle cx="36"   cy="209" r="1.5"/>
        <circle cx="108"  cy="209" r="1.5"/>
        <circle cx="180"  cy="209" r="1.5"/>
      </g>

      <rect x="-220" y="-200" width="420" height="22" fill="url(#beer)"/>

      <path d="M 130 -134 L 200 -134 L 200 178 L 130 178 Z" fill="#000" opacity="0.18"/>
      <rect x="-220" y="-134" width="36" height="312" fill="#FFF" opacity="0.05"/>
    </g>

    <g transform="translate(512 600)">
      <ellipse cx="-10" cy="-200" rx="275" ry="48" fill="url(#foam)"/>
      <circle cx="-208" cy="-220" r="42" fill="url(#foam)"/>
      <circle cx="-148" cy="-252" r="56" fill="url(#foam)"/>
      <circle cx="-72"  cy="-280" r="68" fill="url(#foam)"/>
      <circle cx="20"   cy="-294" r="72" fill="url(#foam)"/>
      <circle cx="105"  cy="-278" r="62" fill="url(#foam)"/>
      <circle cx="180"  cy="-248" r="50" fill="url(#foam)"/>
      <circle cx="-92"  cy="-322" r="22" fill="#FFFEF5"/>
      <circle cx="-26"  cy="-340" r="20" fill="#FFFEF5"/>
      <circle cx="48"   cy="-336" r="22" fill="#FFFEF5"/>
      <circle cx="118"  cy="-318" r="17" fill="#FFFEF5"/>
      <ellipse cx="-50" cy="-292" rx="24" ry="9" fill="#FFFFFF" opacity="0.85"/>
      <ellipse cx="65"  cy="-306" rx="20" ry="7" fill="#FFFFFF" opacity="0.85"/>
    </g>

    <g transform="translate(360 250)">
      <circle r="58" fill="url(#sparkleGlow)"/>
      <use href="#sparkle" x="-45" y="-45" width="90" height="90" fill="#E5B8FF"/>
      <use href="#sparkle" x="-22" y="-22" width="44" height="44" fill="#FFFFFF"/>
    </g>

    <g transform="translate(720 290)">
      <circle r="40" fill="url(#sparkleGlow)" opacity="0.85"/>
      <use href="#sparkle" x="-30" y="-30" width="60" height="60" fill="#C77DFF"/>
      <use href="#sparkle" x="-12" y="-12" width="24" height="24" fill="#FFFFFF"/>
    </g>

    <g transform="translate(625 350)">
      <use href="#sparkle" x="-20" y="-20" width="40" height="40" fill="#FFB7E5"/>
      <use href="#sparkle" x="-7"  y="-7"  width="14" height="14" fill="#FFFFFF"/>
    </g>

    <g transform="translate(255 400)">
      <use href="#sparkle" x="-15" y="-15" width="30" height="30" fill="#E0B0FF"/>
      <use href="#sparkle" x="-5"  y="-5"  width="10" height="10" fill="#FFFFFF"/>
    </g>

    <g transform="translate(810 460)">
      <use href="#sparkle" x="-13" y="-13" width="26" height="26" fill="#FFB7E5"/>
    </g>

    <circle cx="200" cy="180" r="4.5" fill="#FFFFFF" opacity="0.85"/>
    <circle cx="800" cy="170" r="5"   fill="#E0B0FF" opacity="0.9"/>
    <circle cx="170" cy="540" r="3.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="450" cy="160" r="3"   fill="#FFFFFF" opacity="0.75"/>
    <circle cx="595" cy="220" r="3"   fill="#FFFFFF" opacity="0.6"/>
    <circle cx="880" cy="320" r="3.5" fill="#FFFFFF" opacity="0.6"/>
  </g>
</svg>
