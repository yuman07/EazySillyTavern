appId: com.eazysillytavern.app
productName: EazySillyTavern
copyright: Copyright (c) ${author}
# Maximum compression: dmg uses ULFO (LZFSE) instead of bzip2, exe uses LZMA.
# Squeezes the bundled SillyTavern node_modules (~363MB raw) under SPEC §十一-12's
# 250MB budget for the dmg / portable exe.
compression: maximum

# Per SPEC §六-8: only zh-* (mapped to zh-CN) and other locales (mapped to en-US)
# are surfaced. SillyTavern itself supplies its own i18n. Drop Electron's
# unused locale packs (~44MB on mac, ~10MB on win, ~50 locales total).
#
# Note: locale identifiers differ by platform. macOS .lproj basenames use
# underscores ("zh_CN", "en"), while Windows .pak filenames use BCP-47 hyphens
# ("zh-CN", "en-US"). Configure each in the platform block below.

directories:
  buildResources: build
  output: dist

# Only ship what the Electron shell needs. The SillyTavern bundle goes via extraResources.
files:
  - "package.json"
  - "src/**/*"
  - "i18n/**/*"
  - "!**/.DS_Store"
  - "!**/*.map"

# electron-builder's extraResources implicitly excludes node_modules even when
# you ask it to copy a directory wholesale. Workaround: copy node_modules as
# its own extraResources entry (where it's treated as a regular path) so the
# bundled SillyTavern can resolve its production deps at runtime.
extraResources:
  - from: "resources/sillytavern"
    to: "sillytavern"
  - from: "resources/sillytavern/node_modules"
    to: "sillytavern/node_modules"
  - from: "resources/node"
    to: "node"

asar: true
asarUnpack: []

# We do NOT sign on either platform. README walks users through Gatekeeper / SmartScreen.
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  icon: build/icon.png
  artifactName: "EazySillyTavern-${version}-mac-arm64.${ext}"
  electronLanguages:
    - en
    - en_GB
    - zh_CN
    - zh_TW

dmg:
  writeUpdateInfo: false
  artifactName: "EazySillyTavern-${version}-mac-arm64.${ext}"

win:
  target:
    - target: portable
      arch: x64
  icon: build/icon.png
  signAndEditExecutable: false
  artifactName: "EazySillyTavern-${version}-win-x64.${ext}"
  electronLanguages:
    - en-US
    - en-GB
    - zh-CN
    - zh-TW

portable:
  artifactName: "EazySillyTavern-${version}-win-x64.${ext}"

# Disable electron-builder's auto-publish; releases are uploaded by GitHub Actions.
publish: null

# Single-instance, no installer registry footprint on Windows (handled by `portable` target).
